name: Ansible CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible and linters
        run: |
          pip install ansible ansible-lint yamllint

      - name: Run yamllint
        run: yamllint ansible/

      - name: Run ansible-lint
        run: ansible-lint ansible/site.yml
